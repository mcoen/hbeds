<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1180" viewBox="0 0 1600 1180">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px Arial, sans-serif; fill: #475569; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 10; ry: 10; }
      .enum { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 10; ry: 10; }
      .text { font: 600 16px Arial, sans-serif; fill: #0f172a; }
      .small { font: 13px Arial, sans-serif; fill: #334155; }
      .line { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .diamond { fill: #ffffff; stroke: #64748b; stroke-width: 2; }
      .label { font: 12px Arial, sans-serif; fill: #475569; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
    </marker>
  </defs>

  <text x="40" y="40" class="title">HBEDS Object Model</text>
  <text x="40" y="64" class="subtitle">Core domain objects, reporting aggregates, and operational integration models</text>

  <rect class="box" x="40" y="110" width="300" height="220" />
  <text x="60" y="140" class="text">Facility</text>
  <text x="60" y="168" class="small">id, code, name</text>
  <text x="60" y="188" class="small">facilityType</text>
  <text x="60" y="208" class="small">addressLine1, addressLine2</text>
  <text x="60" y="228" class="small">city, state, zip, phone</text>
  <text x="60" y="248" class="small">county, region</text>
  <text x="60" y="268" class="small">latitude, longitude</text>
  <text x="60" y="288" class="small">updatedAt</text>

  <rect class="box" x="410" y="90" width="340" height="300" />
  <text x="430" y="120" class="text">BedStatusRecord</text>
  <text x="430" y="148" class="small">id, facilityId</text>
  <text x="430" y="168" class="small">facilityCode, facilityName</text>
  <text x="430" y="188" class="small">county, region, unit</text>
  <text x="430" y="208" class="small">bedType, operationalStatus</text>
  <text x="430" y="228" class="small">staffedBeds, occupiedBeds, availableBeds</text>
  <text x="430" y="248" class="small">covidConfirmed, influenzaConfirmed, rsvConfirmed</text>
  <text x="430" y="268" class="small">newCovidAdmissions</text>
  <text x="430" y="288" class="small">newInfluenzaAdmissions</text>
  <text x="430" y="308" class="small">newRsvAdmissions</text>
  <text x="430" y="328" class="small">lastUpdatedAt, updatedAt</text>

  <rect class="box" x="40" y="390" width="300" height="220" />
  <text x="60" y="420" class="text">FacilitySubmissionCounter</text>
  <text x="60" y="448" class="small">totalSubmissions</text>
  <text x="60" y="468" class="small">firstSubmissionAt, lastSubmissionAt</text>
  <text x="60" y="488" class="small">intervalCount, intervalMinutesTotal</text>
  <text x="60" y="508" class="small">onTimeIntervals, lateIntervals</text>
  <text x="60" y="528" class="small">sourceCounts</text>
  <text x="60" y="548" class="small">recentSubmissions[]</text>

  <rect class="box" x="410" y="450" width="280" height="120" />
  <text x="430" y="480" class="text">SubmissionEntry</text>
  <text x="430" y="508" class="small">submittedAt</text>
  <text x="430" y="528" class="small">source</text>

  <rect class="box" x="760" y="110" width="290" height="190" />
  <text x="780" y="140" class="text">UploadJob</text>
  <text x="780" y="168" class="small">id, source, createdAt</text>
  <text x="780" y="188" class="small">receivedRows</text>
  <text x="780" y="208" class="small">inserted, updated, rejected</text>
  <text x="780" y="228" class="small">errors[]</text>

  <rect class="box" x="1110" y="130" width="220" height="110" />
  <text x="1130" y="160" class="text">UploadError</text>
  <text x="1130" y="188" class="small">row</text>
  <text x="1130" y="208" class="small">reason</text>

  <rect class="box" x="760" y="360" width="320" height="170" />
  <text x="780" y="390" class="text">DashboardSummary</text>
  <text x="780" y="418" class="small">totalFacilities</text>
  <text x="780" y="438" class="small">totalStaffedBeds, totalOccupiedBeds</text>
  <text x="780" y="458" class="small">totalAvailableBeds</text>
  <text x="780" y="478" class="small">statusCounts[], bedTypeCounts[]</text>
  <text x="780" y="498" class="small">lastChangedAt, revision</text>

  <rect class="box" x="760" y="590" width="320" height="170" />
  <text x="780" y="620" class="text">Snapshot</text>
  <text x="780" y="648" class="small">facilities[]</text>
  <text x="780" y="668" class="small">bedStatuses[]</text>
  <text x="780" y="688" class="small">uploadJobs[]</text>
  <text x="780" y="708" class="small">lastChangedAt, revision</text>

  <rect class="box" x="1110" y="350" width="260" height="150" />
  <text x="1130" y="380" class="text">AggregateCount</text>
  <text x="1130" y="408" class="small">label</text>
  <text x="1130" y="428" class="small">count</text>

  <rect class="box" x="40" y="700" width="360" height="180" />
  <text x="60" y="730" class="text">FacilitySubmissionReport</text>
  <text x="60" y="758" class="small">facility</text>
  <text x="60" y="778" class="small">sinceStartedAt, totalSubmissions</text>
  <text x="60" y="798" class="small">expectedSubmissions</text>
  <text x="60" y="818" class="small">averageMinutesBetweenSubmissions</text>
  <text x="60" y="838" class="small">onTimeRate, sourceCounts</text>

  <rect class="box" x="440" y="720" width="250" height="110" />
  <text x="460" y="750" class="text">SubmissionEvent</text>
  <text x="460" y="778" class="small">facilityId, facilityCode</text>
  <text x="460" y="798" class="small">facilityName, submittedAt, source</text>

  <rect class="box" x="760" y="830" width="300" height="150" />
  <text x="780" y="860" class="text">CdcNhsnTransmission</text>
  <text x="780" y="888" class="small">id, system, status, source</text>
  <text x="780" y="908" class="small">revision, records</text>
  <text x="780" y="928" class="small">submittedAt, acknowledgedAt</text>
  <text x="780" y="948" class="small">responseCode, message</text>

  <rect class="box" x="1110" y="560" width="260" height="160" />
  <text x="1130" y="590" class="text">SimulationStatus</text>
  <text x="1130" y="618" class="small">enabled, intervalMinutes</text>
  <text x="1130" y="638" class="small">facilityTarget, updatesPerCycle</text>
  <text x="1130" y="658" class="small">totalRuns, totalUpdatesSent</text>
  <text x="1130" y="678" class="small">lastRunAt, nextRunAt, inProgress</text>
  <text x="1130" y="698" class="small">lastError</text>

  <rect class="box" x="1110" y="760" width="300" height="180" />
  <text x="1130" y="790" class="text">CdcNhsnAutoSyncStatus</text>
  <text x="1130" y="818" class="small">enabled, frequencyPerDay</text>
  <text x="1130" y="838" class="small">intervalMinutes</text>
  <text x="1130" y="858" class="small">totalRuns, totalSuccessful, totalFailed</text>
  <text x="1130" y="878" class="small">lastRunAt, lastSuccessAt</text>
  <text x="1130" y="898" class="small">nextRunAt, lastError</text>

  <rect class="box" x="1110" y="960" width="300" height="150" />
  <text x="1130" y="990" class="text">CdcNhsnConfigView</text>
  <text x="1130" y="1018" class="small">enabled, tokenUrl, uploadUrl</text>
  <text x="1130" y="1038" class="small">authScope, environment</text>
  <text x="1130" y="1058" class="small">clientId, username</text>
  <text x="1130" y="1078" class="small">clientSecretConfigured, passwordConfigured</text>

  <rect class="enum" x="1440" y="120" width="120" height="150" />
  <text x="1460" y="150" class="text">BedType</text>
  <text x="1460" y="178" class="small">adult_icu</text>
  <text x="1460" y="198" class="small">medical_surgical</text>
  <text x="1460" y="218" class="small">obstetric</text>
  <text x="1460" y="238" class="small">...</text>

  <rect class="enum" x="1440" y="310" width="120" height="120" />
  <text x="1460" y="340" class="text">OperationalStatus</text>
  <text x="1460" y="368" class="small">open</text>
  <text x="1460" y="388" class="small">limited</text>
  <text x="1460" y="408" class="small">diversion/closed</text>

  <rect class="enum" x="1440" y="470" width="120" height="140" />
  <text x="1460" y="500" class="text">FacilityType</text>
  <text x="1460" y="528" class="small">general_acute_care</text>
  <text x="1460" y="548" class="small">critical_access</text>
  <text x="1460" y="568" class="small">specialty_hospital</text>
  <text x="1460" y="588" class="small">...</text>

  <line class="line" x1="340" y1="220" x2="410" y2="220" />
  <text x="350" y="210" class="label">1 to many reports</text>

  <line class="line" x1="190" y1="330" x2="190" y2="390" />
  <text x="200" y="365" class="label">1 to 1 cadence</text>

  <polygon class="diamond" points="340,500 355,490 370,500 355,510" />
  <line class="line" x1="370" y1="500" x2="410" y2="500" />
  <text x="330" y="485" class="label">contains recentSubmissions</text>

  <polygon class="diamond" points="1050,210 1065,200 1080,210 1065,220" />
  <line class="line" x1="1080" y1="210" x2="1110" y2="210" />
  <text x="1020" y="195" class="label">has errors</text>

  <polygon class="diamond" points="1080,430 1095,420 1110,430 1095,440" />
  <line class="line" x1="1080" y1="430" x2="1110" y2="430" />
  <text x="1010" y="415" class="label">aggregate counts</text>

  <polygon class="diamond" points="920,650 935,640 950,650 935,660" />
  <line class="line" x1="760" y1="650" x2="920" y2="650" />
  <line class="line" x1="935" y1="640" x2="935" y2="330" />
  <line class="line" x1="935" y1="330" x2="750" y2="330" />
  <text x="840" y="635" class="label">contains facilities, bedStatuses, uploadJobs</text>

  <line class="line" x1="400" y1="780" x2="440" y2="780" />
  <text x="300" y="765" class="label">derived recent events</text>

  <line class="line" x1="750" y1="220" x2="1440" y2="190" />
  <text x="1180" y="180" class="label">typed by</text>

  <line class="line" x1="750" y1="250" x2="1440" y2="360" />
  <text x="1180" y="300" class="label">status enum</text>

  <line class="line" x1="340" y1="160" x2="1440" y2="540" />
  <text x="1120" y="520" class="label">facility type enum</text>
</svg>
