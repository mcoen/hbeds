<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px Arial, sans-serif; fill: #475569; }
      .table { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 10; ry: 10; }
      .header { font: 700 16px Arial, sans-serif; fill: #0f172a; }
      .field { font: 13px Arial, sans-serif; fill: #334155; }
      .line { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .label { font: 12px Arial, sans-serif; fill: #475569; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
    </marker>
  </defs>

  <text x="40" y="40" class="title">HBEDS Data Model ERD</text>
  <text x="40" y="64" class="subtitle">Persisted collections and operationally important runtime records</text>

  <rect class="table" x="40" y="110" width="280" height="250" />
  <text x="60" y="140" class="header">FACILITY</text>
  <text x="60" y="168" class="field">PK id</text>
  <text x="60" y="188" class="field">UK code</text>
  <text x="60" y="208" class="field">name</text>
  <text x="60" y="228" class="field">facility_type</text>
  <text x="60" y="248" class="field">address_line_1, address_line_2</text>
  <text x="60" y="268" class="field">city, state, zip</text>
  <text x="60" y="288" class="field">phone</text>
  <text x="60" y="308" class="field">county, region</text>
  <text x="60" y="328" class="field">latitude, longitude</text>
  <text x="60" y="348" class="field">updated_at</text>

  <rect class="table" x="390" y="90" width="330" height="320" />
  <text x="410" y="120" class="header">BED_STATUS_RECORD</text>
  <text x="410" y="148" class="field">PK id</text>
  <text x="410" y="168" class="field">FK facility_id</text>
  <text x="410" y="188" class="field">facility_code, facility_name</text>
  <text x="410" y="208" class="field">county, region</text>
  <text x="410" y="228" class="field">unit</text>
  <text x="410" y="248" class="field">bed_type</text>
  <text x="410" y="268" class="field">operational_status</text>
  <text x="410" y="288" class="field">staffed_beds, occupied_beds</text>
  <text x="410" y="308" class="field">available_beds</text>
  <text x="410" y="328" class="field">covid_confirmed, influenza_confirmed, rsv_confirmed</text>
  <text x="410" y="348" class="field">new_covid_admissions, new_influenza_admissions</text>
  <text x="410" y="368" class="field">new_rsv_admissions</text>
  <text x="410" y="388" class="field">last_updated_at, updated_at</text>

  <rect class="table" x="40" y="420" width="300" height="210" />
  <text x="60" y="450" class="header">FACILITY_SUBMISSION_COUNTER</text>
  <text x="60" y="478" class="field">PK/FK facility_id</text>
  <text x="60" y="498" class="field">total_submissions</text>
  <text x="60" y="518" class="field">first_submission_at, last_submission_at</text>
  <text x="60" y="538" class="field">interval_count</text>
  <text x="60" y="558" class="field">interval_minutes_total</text>
  <text x="60" y="578" class="field">on_time_intervals, late_intervals</text>

  <rect class="table" x="390" y="470" width="280" height="130" />
  <text x="410" y="500" class="header">FACILITY_SUBMISSION_SOURCE_COUNT</text>
  <text x="410" y="528" class="field">FK facility_id</text>
  <text x="410" y="548" class="field">source</text>
  <text x="410" y="568" class="field">count</text>

  <rect class="table" x="390" y="640" width="280" height="130" />
  <text x="410" y="670" class="header">FACILITY_SUBMISSION_RECENT_EVENT</text>
  <text x="410" y="698" class="field">FK facility_id</text>
  <text x="410" y="718" class="field">submitted_at</text>
  <text x="410" y="738" class="field">source</text>

  <rect class="table" x="760" y="100" width="260" height="170" />
  <text x="780" y="130" class="header">UPLOAD_JOB</text>
  <text x="780" y="158" class="field">PK id</text>
  <text x="780" y="178" class="field">source</text>
  <text x="780" y="198" class="field">created_at</text>
  <text x="780" y="218" class="field">received_rows, inserted</text>
  <text x="780" y="238" class="field">updated, rejected</text>

  <rect class="table" x="1090" y="120" width="240" height="120" />
  <text x="1110" y="150" class="header">UPLOAD_ERROR</text>
  <text x="1110" y="178" class="field">FK upload_job_id</text>
  <text x="1110" y="198" class="field">row_number</text>
  <text x="1110" y="218" class="field">reason</text>

  <rect class="table" x="760" y="330" width="260" height="120" />
  <text x="780" y="360" class="header">STORE_SNAPSHOT</text>
  <text x="780" y="388" class="field">started_at</text>
  <text x="780" y="408" class="field">revision</text>
  <text x="780" y="428" class="field">last_changed_at</text>

  <rect class="table" x="760" y="500" width="300" height="180" />
  <text x="780" y="530" class="header">CDC_NHSN_TRANSMISSION</text>
  <text x="780" y="558" class="field">PK id</text>
  <text x="780" y="578" class="field">system, status, source</text>
  <text x="780" y="598" class="field">revision, records</text>
  <text x="780" y="618" class="field">submitted_at, acknowledged_at</text>
  <text x="780" y="638" class="field">response_code</text>
  <text x="780" y="658" class="field">message</text>

  <rect class="table" x="1120" y="360" width="300" height="180" />
  <text x="1140" y="390" class="header">CDC_NHSN_CONFIG</text>
  <text x="1140" y="418" class="field">enabled</text>
  <text x="1140" y="438" class="field">token_url, upload_url</text>
  <text x="1140" y="458" class="field">auth_scope</text>
  <text x="1140" y="478" class="field">client_id, username</text>
  <text x="1140" y="498" class="field">environment</text>
  <text x="1140" y="518" class="field">request_timeout_ms</text>

  <rect class="table" x="1120" y="580" width="300" height="190" />
  <text x="1140" y="610" class="header">CDC_NHSN_AUTO_SYNC_STATUS</text>
  <text x="1140" y="638" class="field">enabled</text>
  <text x="1140" y="658" class="field">frequency_per_day, interval_minutes</text>
  <text x="1140" y="678" class="field">total_runs, total_successful</text>
  <text x="1140" y="698" class="field">total_failed</text>
  <text x="1140" y="718" class="field">last_run_at, last_success_at</text>
  <text x="1140" y="738" class="field">next_run_at, last_error</text>

  <rect class="table" x="1120" y="810" width="300" height="190" />
  <text x="1140" y="840" class="header">SIMULATION_STATUS</text>
  <text x="1140" y="868" class="field">enabled, interval_minutes</text>
  <text x="1140" y="888" class="field">facility_target, updates_per_cycle</text>
  <text x="1140" y="908" class="field">total_runs, total_updates_sent</text>
  <text x="1140" y="928" class="field">last_run_updates</text>
  <text x="1140" y="948" class="field">last_run_at, next_run_at</text>
  <text x="1140" y="968" class="field">in_progress, last_error</text>

  <line class="line" x1="320" y1="220" x2="390" y2="220" />
  <text x="330" y="208" class="label">1 to many</text>

  <line class="line" x1="190" y1="360" x2="190" y2="420" />
  <text x="200" y="398" class="label">1 to 1</text>

  <line class="line" x1="340" y1="520" x2="390" y2="520" />
  <text x="300" y="505" class="label">source breakdown</text>

  <line class="line" x1="340" y1="600" x2="390" y2="700" />
  <text x="285" y="650" class="label">recent submissions</text>

  <line class="line" x1="1020" y1="185" x2="1090" y2="185" />
  <text x="1010" y="170" class="label">1 to many</text>

  <line class="line" x1="890" y1="330" x2="180" y2="330" />
  <line class="line" x1="180" y1="330" x2="180" y2="110" />
  <text x="480" y="315" class="label">snapshot contains facilities</text>

  <line class="line" x1="900" y1="450" x2="900" y2="410" />
  <line class="line" x1="900" y1="410" x2="710" y2="410" />
  <text x="760" y="395" class="label">snapshot contains statuses/jobs</text>
</svg>
